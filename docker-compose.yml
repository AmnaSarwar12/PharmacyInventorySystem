version: '3.8'
services:
  pharmacyinventorysystem:
    build: .
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=PharmacyInventoryDB;User Id=sa;Password=Pharmacy@123456;TrustServerCertificate=True
      - Jwt__Key=MySuperSecretKeyHere123456789!@#$
      - Jwt__Issuer=PharmacyInventorySystem
      - Jwt__Audience=PharmacyInventorySystemUsers
    depends_on:
      - db
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Pharmacy@123456"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
volumes:
  sqlvolume:
